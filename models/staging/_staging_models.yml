version: 2

models:
  - name: stg_airbyte__plc_tags
    description: >
      Staging de variables PLC. Limpia tipos de dato, renombra columnas
      a nombres de negocio y extrae el prefijo de zona desde la dirección lógica.
    columns:
      - name: tag_name
        description: Nombre único de la variable en el PLC
        tests:
          - not_null
          - unique
      - name: data_type
        description: Tipo de dato (Bool, Int, Real, etc.)
        tests:
          - not_null
      - name: logical_address
        description: Dirección lógica completa (%I0.2, %Q0.0, %M0.1)
        tests:
          - not_null
      - name: address_prefix
        description: Prefijo extraído (I, Q, M)
        tests:
          - not_null
          - accepted_values:
              values: ['I', 'Q', 'M']
      - name: is_hmi_visible
        description: Boolean — variable visible en HMI
        tests:
          - not_null
      - name: is_hmi_accessible
        description: Boolean — variable accesible desde HMI
        tests:
          - not_null

  - name: stg_airbyte__repositories
    description: >
      Staging de repositorios GitHub de AirbyteHQ. Normaliza tipos,
      extrae el nombre del repositorio desde la clone_url y convierte
      el campo archived a boolean.
    columns:
      - name: repository_id
        description: ID numérico único del repositorio en GitHub
        tests:
          - not_null
          - unique
      - name: repository_name
        description: Nombre del repositorio extraído de la clone_url
        tests:
          - not_null
      - name: is_archived
        description: Boolean — true si el repositorio está archivado
        tests:
          - not_null
      - name: last_updated_at
        description: Timestamp de la última actualización del repositorio
        tests:
          - not_null
